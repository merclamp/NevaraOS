set timeout=10
set default=0

# Do NOT set gfxmode/gfxterm here — on Sandy Bridge iGPU the terminal_output
# gfxterm command can blank the display. The kernel requests a framebuffer
# directly via the Multiboot2 tag; GRUB passes whatever the firmware gave it.
set gfxpayload=keep

menuentry "Nevara OS" {
    multiboot2 /boot/kernel
    module2    /boot/rootfs.ext4 rootfs
    boot
}

menuentry "Nevara OS (safe mode - text GRUB)" {
    # Explicitly stay in text mode for GRUB, then let kernel request framebuffer.
    set gfxpayload=text
    multiboot2 /boot/kernel
    module2    /boot/rootfs.ext4 rootfs
    boot
}

menuentry "Nevara OS (no framebuffer - serial only)" {
    # Kernel runs on serial COM1 only. No screen output.
    # Connect USB-to-serial adapter at 115200 baud to see output.
    set gfxpayload=text
    multiboot2 /boot/kernel
    boot
}
