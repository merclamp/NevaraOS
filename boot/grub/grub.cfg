set timeout=5
set default=0

# Framebuffer: try 1024x768x32 first (QEMU default), then fall back to
# whatever the firmware provides. gfxpayload=keep passes the mode to the
# kernel via the Multiboot2 framebuffer tag.
set gfxmode=1024x768x32,1024x768x24,1280x800x32,1280x720x32,auto
set gfxpayload=keep

menuentry "Nevara OS" {
    insmod all_video
    insmod gfxterm
    insmod vbe
    insmod vga
    # Try to switch to graphical terminal; silently fall back if unavailable.
    if terminal_output gfxterm; then true; fi
    multiboot2 /boot/kernel
    # Load rootfs.ext4 as a Multiboot2 module.
    # - On Ventoy: GRUB finds it inside the ISO image — this is the primary path.
    # - On QEMU:   the module is loaded but ext4 prefers the faster ATA drive.
    # - On direct dd boot: same as QEMU (ATA drive wins unless not present).
    module2 /boot/rootfs.ext4 rootfs
    boot
}

menuentry "Nevara OS (serial fallback)" {
    # Text-mode boot — use if the display stays black.
    multiboot2 /boot/kernel
    module2 /boot/rootfs.ext4 rootfs
    boot
}

menuentry "Nevara OS (no rootfs — diagnostics)" {
    # Boot without rootfs. The kernel prints diagnostics and halts at VFS init.
    multiboot2 /boot/kernel
    boot
}
