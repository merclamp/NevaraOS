set timeout=5
set default=0

# Framebuffer: try 1024x768x32 first (QEMU default), then fall back to
# whatever the firmware provides. gfxpayload=keep passes the mode to the
# kernel via the Multiboot2 framebuffer tag.
set gfxmode=1024x768x32,1024x768x24,1280x800x32,1280x720x32,auto
set gfxpayload=keep

menuentry "Nevara OS" {
    insmod all_video
    insmod gfxterm
    insmod vbe
    insmod vga
    # Try to switch to graphical terminal; if it fails GRUB falls back
    # to text mode — the kernel still boots and outputs to serial.
    if terminal_output gfxterm; then true; fi
    multiboot2 /boot/kernel
    boot
}

menuentry "Nevara OS (serial fallback)" {
    # Text-mode boot — useful if the framebuffer is black on your hardware.
    # All output goes to COM1 at 115200 baud and to the VGA text console.
    multiboot2 /boot/kernel
    boot
}

menuentry "Nevara OS (safe — no GUI)" {
    # Boot without requesting a framebuffer. Falls through to serial only.
    # Use when the display stays black after the normal entry.
    multiboot2 /boot/kernel
    boot
}
