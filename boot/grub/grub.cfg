set timeout=5
set default=0

# Ask GRUB for a linear framebuffer. On real hardware GRUB will negotiate
# the best available mode; on QEMU it gives exactly 1024x768x32.
# If the machine does not support the requested depth, GRUB falls back to
# whatever it can provide — the kernel handles any resolution gracefully.
set gfxmode=1024x768x32,1024x768x24,1280x800x32,auto
set gfxpayload=keep

menuentry "Nevara OS" {
    insmod all_video
    insmod gfxterm
    insmod vbe
    insmod vga
    terminal_output gfxterm
    multiboot2 /boot/kernel
    module2    /boot/rootfs.ext4 rootfs
    boot
}

menuentry "Nevara OS (serial console fallback)" {
    # Use this if the framebuffer is broken on your hardware.
    # All output goes to COM1 at 115200 baud.
    multiboot2 /boot/kernel
    module2    /boot/rootfs.ext4 rootfs
    boot
}

menuentry "Nevara OS (safe — no rootfs)" {
    # Boots without rootfs.ext4 — useful if the drive is not recognised.
    # The kernel prints diagnostics and halts at [vfs] init.
    multiboot2 /boot/kernel
    boot
}
